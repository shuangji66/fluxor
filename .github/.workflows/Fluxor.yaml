name: Build fluxor-amd64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: 安装依赖（Node.js、Go）
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          # 安装 Node.js 24
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs
          # 安装 Go
          sudo snap install go --classic

      - name: 克隆 fluxor 源码
        run: |
          git clone https://github.com/shuangji66/fluxor.git fluxor-src
          ls -la fluxor-src

      - name: 构建前端 (web)
        working-directory: ./fluxor-src/web
        run: |
          npm ci
          npm run build

      - name: 构建 Go 后端（amd64）
        working-directory: ./fluxor-src
        run: |
          GOOS=linux GOARCH=amd64 go build -tags vue -ldflags="-s -w" -o fluxor-amd64
          
      - name: 上传 fluxor-amd64 二进制作为 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: fluxor-amd64
          path: fluxor-src/fluxor-amd64
          compression-level: 0
